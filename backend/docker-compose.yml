services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/backend
    command: mvn spring-boot:run
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/delivery
      DB_USERNAME: delivery
      DB_PASSWORD: delivery
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/delivery
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_PRESIGNED_URL_EXPIRATION_SECONDS: ${AWS_S3_PRESIGNED_URL_EXPIRATION_SECONDS:-900}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      prometheus:
        condition: service_started
