spring:
  # dev (MinIO) salvo indicação em contrário; produção define SPRING_PROFILES_ACTIVE=prod.
  profiles:
    default: dev
  # Load the repo-root .env (KEY=VALUE) so local dev picks up AWS_* etc. without
  # exporting them into the shell. Optional + multiple paths to tolerate the run
  # working dir being the repo root, backend/, or backend/backend/. OS env vars
  # still win over these, so production (real env vars) is unaffected.
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: delivery-marketplace
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/delivery}
    username: ${DB_USERNAME:delivery}
    password: ${DB_PASSWORD:delivery}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/delivery}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/delivery}/protocol/openid-connect/certs

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.delivery: INFO

app:
  api-base-path: /api/v1
  catalog:
    price-review:
      enabled: true          # false → all price edits apply in place, audit-only
      threshold-percent: 20  # |Δ%| strictly greater triggers moderation
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174,http://localhost:4173}
  storage:
    s3-bucket: ${AWS_S3_BUCKET:delivery-marketplace-local}
    s3-region: ${AWS_REGION:us-east-1}
    s3-endpoint: ${AWS_S3_ENDPOINT:}
    # When set (e.g. from .env), used directly; otherwise the AWS default
    # credentials chain (env vars, ~/.aws profile, instance role) applies.
    s3-access-key: ${AWS_ACCESS_KEY_ID:}
    s3-secret-key: ${AWS_SECRET_ACCESS_KEY:}
    presigned-url-expiration-seconds: ${AWS_S3_PRESIGNED_URL_EXPIRATION_SECONDS:900}
  keycloak:
    admin:
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8081}
      realm: ${KEYCLOAK_REALM:delivery}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:delivery-admin-service}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:delivery-admin-secret}
  sales:
    status-override:
      enabled: false  # gated manual transition matrix; keep disabled unless explicitly requested
