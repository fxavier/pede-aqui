name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Backend tests
        run: cd backend && mvn clean verify

  backoffice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pede-aqui-backoffice/package-lock.json
      - name: Backoffice checks
        run: cd pede-aqui-backoffice && npm ci && npm run validate && npm run build
        env:
          # CI placeholders only — public, non-secret values inlined by Next.js at build time.
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
          NEXT_PUBLIC_KEYCLOAK_REALM: delivery
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: delivery-app

  delivery-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pede-aqui-delivery/package-lock.json
      - name: Delivery web checks
        run: cd pede-aqui-delivery && npm ci && npm run typecheck && npm test && npm run build

  delivery-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Delivery app checks
        run: cd pede_aqui_delivery_app && flutter pub get && flutter analyze && flutter test

  courier-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Courier app checks
        run: cd pede_aqui_courier_app && flutter pub get && flutter analyze && flutter test
