services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/delivery-realm.json:/opt/keycloak/data/import/delivery-realm.json:ro

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cria o bucket usado pelo perfil dev do backend (application-dev.yml). Idempotente.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/pede-aqui-uploads"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/backend
    command: mvn spring-boot:run
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/delivery
      DB_USERNAME: delivery
      DB_PASSWORD: delivery
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/delivery
      SPRING_DATA_REDIS_HOST: redis
      # Storage: perfil dev (MinIO) por defeito — ver application-dev.yml.
      # O endpoint fica localhost:9000 (default) de propósito: o presign não
      # faz chamadas de rede e o browser é quem faz o PUT, a partir do host.
      # Para AWS real: SPRING_PROFILES_ACTIVE=prod + AWS_S3_BUCKET/AWS_REGION/keys.
    ports:
      - "8082:8080"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      prometheus:
        condition: service_started
